<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Prep Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }
        .dark .glass-card { background: rgba(31, 41, 55, 0.9); }
        transition-all { transition: all 0.3s ease; }
        .option-card:hover { transform: translateY(-2px); border-color: #3b82f6; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 transition-colors duration-300 min-h-screen flex flex-col">

    <header class="bg-blue-600 text-white p-4 sticky top-0 z-50 shadow-lg">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="fas fa-user-md"></i> NEET Prep Portal
            </h1>
            <div id="score-display" class="bg-blue-700 px-3 py-1 rounded-full text-sm font-semibold">
                Score: 0
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 flex-grow pb-24">
        
        <section id="home-view" class="space-y-6">
            <div class="bg-blue-100 p-6 rounded-3xl dark:bg-blue-900">
                <h2 class="text-2xl font-bold mb-2">Welcome Back, Doctor! 🩺</h2>
                <p class="text-sm opacity-80">Track your progress and master your subjects.</p>
            </div>

            <h3 class="font-bold text-lg px-2">Subjects</h3>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div onclick="startQuiz('Biology')" class="glass-card p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-green-500 cursor-pointer transition-all">
                    <div class="bg-green-100 w-12 h-12 rounded-xl flex items-center justify-center text-green-600 mb-4">
                        <i class="fas fa-leaf text-2xl"></i>
                    </div>
                    <h4 class="font-bold">Biology</h4>
                    <p class="text-xs text-gray-500">Botany & Zoology</p>
                </div>
                <div onclick="startQuiz('Physics')" class="glass-card p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-blue-500 cursor-pointer transition-all">
                    <div class="bg-blue-100 w-12 h-12 rounded-xl flex items-center justify-center text-blue-600 mb-4">
                        <i class="fas fa-atom text-2xl"></i>
                    </div>
                    <h4 class="font-bold">Physics</h4>
                    <p class="text-xs text-gray-500">Mechanics & Optics</p>
                </div>
                <div onclick="startQuiz('Chemistry')" class="glass-card p-6 rounded-2xl shadow-sm border-2 border-transparent hover:border-red-500 cursor-pointer transition-all">
                    <div class="bg-red-100 w-12 h-12 rounded-xl flex items-center justify-center text-red-600 mb-4">
                        <i class="fas fa-flask text-2xl"></i>
                    </div>
                    <h4 class="font-bold">Chemistry</h4>
                    <p class="text-xs text-gray-500">Organic & Inorganic</p>
                </div>
            </div>
        </section>

        <section id="quiz-view" class="hidden space-y-4">
            <button onclick="showHome()" class="text-blue-600 font-semibold mb-4"><i class="fas fa-arrow-left"></i> Back to Subjects</button>
            
            <div class="w-full bg-gray-200 rounded-full h-2.5 mb-4">
                <div id="progress-bar" class="bg-blue-600 h-2.5 rounded-full" style="width: 0%"></div>
            </div>

            <div id="question-container" class="glass-card p-6 rounded-2xl shadow-md">
                </div>
        </section>

        <section id="settings-view" class="hidden space-y-6">
            <h2 class="text-2xl font-bold">Settings</h2>
            <div class="glass-card p-4 rounded-2xl space-y-4">
                <div class="flex justify-between items-center">
                    <span>Dark Mode</span>
                    <button onclick="toggleDarkMode()" class="w-12 h-6 bg-gray-300 rounded-full relative">
                        <div id="mode-toggle-circle" class="w-5 h-5 bg-white rounded-full absolute left-0.5 top-0.5 transition-all"></div>
                    </button>
                </div>
                <div class="flex justify-between items-center">
                    <span>Font Size</span>
                    <select onchange="changeFontSize(this.value)" class="bg-gray-100 dark:bg-gray-700 p-2 rounded-lg">
                        <option value="text-base">Normal</option>
                        <option value="text-lg">Large</option>
                        <option value="text-xl">Extra Large</option>
                    </select>
                </div>
                <div class="flex justify-between items-center opacity-50">
                    <span>Notifications</span>
                    <i class="fas fa-toggle-on text-2xl text-blue-500"></i>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full bg-white dark:bg-gray-800 border-t flex justify-around p-3 shadow-2xl">
        <button onclick="showHome()" class="flex flex-col items-center text-blue-600">
            <i class="fas fa-home"></i><span class="text-xs">Home</span>
        </button>
        <button onclick="showHome()" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-th-large"></i><span class="text-xs">Categories</span>
        </button>
        <button onclick="showSettings()" class="flex flex-col items-center text-gray-400">
            <i class="fas fa-cog"></i><span class="text-xs">Settings</span>
        </button>
        <button class="flex flex-col items-center text-gray-400">
            <i class="fas fa-user text-gray-400"></i><span class="text-xs">Profile</span>
        </button>
    </nav>

    <script>
        // --- Question Bank ---
        const questions = [
            { id: 1, subject: "Biology", question: "Which of the following is known as the powerhouse of the cell?", options: ["Nucleus", "Ribosome", "Mitochondria", "Lysosome"], answer: "Mitochondria" },
            { id: 2, subject: "Physics", question: "What is the SI unit of electric current?", options: ["Volt", "Ampere", "Ohm", "Watt"], answer: "Ampere" },
            { id: 3, subject: "Chemistry", question: "Which gas is known as Laughing Gas?", options: ["Nitrogen dioxide", "Nitrous oxide", "Carbon monoxide", "Sulphur dioxide"], answer: "Nitrous oxide" },
            { id: 4, subject: "Biology", question: "Double fertilization is a characteristic of:", options: ["Algae", "Gymnosperms", "Angiosperms", "Pteridophytes"], answer: "Angiosperms" },
            { id: 5, subject: "Physics", question: "A light year is a unit of:", options: ["Time", "Distance", "Speed", "Intensity"], answer: "Distance" },
            // ... Logic allows for 200+ questions. Sample expansion:
            { id: 6, subject: "Chemistry", question: "The pH of human blood is approximately:", options: ["6.4", "7.4", "8.4", "9.4"], answer: "7.4" },
            { id: 7, subject: "Biology", question: "Who is the father of Genetics?", options: ["Darwin", "Mendel", "Lamarck", "Watson"], answer: "Mendel" },
            { id: 8, subject: "Physics", question: "Sound waves in air are:", options: ["Longitudinal", "Transverse", "Electromagnetic", "None"], answer: "Longitudinal" },
            { id: 9, subject: "Chemistry", question: "Which element has the highest electronegativity?", options: ["Oxygen", "Chlorine", "Fluorine", "Nitrogen"], answer: "Fluorine" },
            { id: 10, subject: "Biology", question: "Bile is produced by which organ?", options: ["Stomach", "Pancreas", "Liver", "Gall Bladder"], answer: "Liver" }
        ];

        // --- State Management ---
        let currentQuestions = [];
        let currentQuestionIdx = 0;
        let score = 0;

        // --- Navigation Logic ---
        function showHome() {
            document.getElementById('home-view').classList.remove('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('settings-view').classList.add('hidden');
        }

        function showSettings() {
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.add('hidden');
            document.getElementById('settings-view').classList.remove('hidden');
        }

        function startQuiz(subject) {
            currentQuestions = questions.filter(q => q.subject === subject);
            currentQuestionIdx = 0;
            score = 0;
            updateScore();
            document.getElementById('home-view').classList.add('hidden');
            document.getElementById('quiz-view').classList.remove('hidden');
            renderQuestion();
        }

        // --- Quiz Logic ---
        function renderQuestion() {
            const q = currentQuestions[currentQuestionIdx];
            const container = document.getElementById('question-container');
            const progress = ((currentQuestionIdx) / currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            container.innerHTML = `
                <span class="text-xs font-bold text-blue-500 uppercase">${q.subject} Question</span>
                <p class="text-lg font-semibold mt-2 mb-6">${q.question}</p>
                <div class="space-y-3">
                    ${q.options.map((opt, i) => `
                        <label class="option-card flex items-center p-4 border-2 rounded-xl cursor-pointer transition-all">
                            <input type="radio" name="quiz-opt" value="${opt}" class="hidden">
                            <span class="w-6 h-6 border-2 rounded-full mr-3 flex items-center justify-center text-xs font-bold">${String.fromCharCode(65+i)}</span>
                            ${opt}
                        </label>
                    `).join('')}
                </div>
                <button onclick="checkAnswer()" id="submit-btn" class="w-full mt-8 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg active:scale-95 transition-all">
                    Submit Answer
                </button>
            `;

            // Add click events to labels
            document.querySelectorAll('.option-card').forEach(card => {
                card.onclick = () => {
                    document.querySelectorAll('.option-card').forEach(c => c.classList.remove('border-blue-500', 'bg-blue-50'));
                    card.classList.add('border-blue-500', 'bg-blue-50');
                };
            });
        }

        function checkAnswer() {
            const selected = document.querySelector('input[name="quiz-opt"]:checked');
            if (!selected) return alert("Please select an option!");

            const q = currentQuestions[currentQuestionIdx];
            const isCorrect = selected.value === q.answer;
            const submitBtn = document.getElementById('submit-btn');

            if (isCorrect) {
                score++;
                updateScore();
            }

            // Highlight Correct/Incorrect
            document.querySelectorAll('.option-card').forEach(card => {
                const val = card.querySelector('input').value;
                if (val === q.answer) {
                    card.classList.add('bg-green-100', 'border-green-500', 'text-green-700');
                } else if (val === selected.value && !isCorrect) {
                    card.classList.add('bg-red-100', 'border-red-500', 'text-red-700');
                }
                card.style.pointerEvents = 'none';
            });

            submitBtn.innerText = "Next Question";
            submitBtn.onclick = nextQuestion;
        }

        function nextQuestion() {
            currentQuestionIdx++;
            if (currentQuestionIdx < currentQuestions.length) {
                renderQuestion();
            } else {
                finishQuiz();
            }
        }

        function finishQuiz() {
            document.getElementById('progress-bar').style.width = `100%`;
            document.getElementById('question-container').innerHTML = `
                <div class="text-center py-10">
                    <i class="fas fa-trophy text-6xl text-yellow-400 mb-4"></i>
                    <h2 class="text-2xl font-bold">Quiz Completed!</h2>
                    <p class="text-gray-500 mb-6">You scored ${score} out of ${currentQuestions.length}</p>
                    <button onclick="showHome()" class="bg-blue-600 text-white px-8 py-3 rounded-full font-bold">Try Another Subject</button>
                </div>
            `;
        }

        function updateScore() {
            document.getElementById('score-display').innerText = `Score: ${score}`;
        }

        // --- Settings Logic ---
        function toggleDarkMode() {
            document.body.classList.toggle('dark');
            const circle = document.getElementById('mode-toggle-circle');
            circle.classList.toggle('translate-x-6');
            if(document.body.classList.contains('dark')) {
                document.body.style.backgroundColor = '#111827';
                document.body.style.color = '#f3f4f6';
            } else {
                document.body.style.backgroundColor = '#f9fafb';
                document.body.style.color = '#111827';
            }
        }

        function changeFontSize(sizeClass) {
            const container = document.getElementById('question-container');
            container.classList.remove('text-base', 'text-lg', 'text-xl');
            container.classList.add(sizeClass);
        }
    </script>
</body>
  </html>
