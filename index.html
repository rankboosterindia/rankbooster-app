<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEET Prep Pro Max</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #2563eb; }
        body { font-family: 'Inter', sans-serif; transition: all 0.3s ease; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.3); }
        .dark body { background-color: #0f172a; color: white; }
        .dark .glass { background: #1e293b; border-color: #334155; }
        .option-card { border: 2px solid #e2e8f0; transition: 0.2s; cursor: pointer; }
        .option-card:hover { border-color: var(--primary); background: #eff6ff; }
        .correct { background: #dcfce7 !important; border-color: #22c55e !important; color: #166534; }
        .wrong { background: #fee2e2 !important; border-color: #ef4444 !important; color: #991b1b; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900">

    <header class="glass sticky top-0 z-50 p-4 border-b">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-black text-blue-600">NEET<span class="text-slate-400">PRO</span></h1>
            <div class="flex items-center gap-3">
                <span id="global-score" class="bg-blue-600 text-white px-3 py-1 rounded-full text-xs font-bold shadow-lg">Score: 0</span>
            </div>
        </div>
    </header>

    <main class="container mx-auto p-4 max-w-xl pb-24">
        
        <section id="home" class="page active space-y-6">
            <div class="bg-gradient-to-br from-blue-600 to-indigo-700 p-8 rounded-[2rem] text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <h2 class="text-2xl font-bold">Welcome, Future Doctor!</h2>
                    <p class="opacity-80 text-sm">Target: NEET 2026</p>
                    <button onclick="switchPage('categories')" class="mt-4 bg-white text-blue-600 px-6 py-2 rounded-full font-bold text-sm shadow-lg">Start Practice</button>
                </div>
                <i class="fas fa-stethoscope absolute -right-4 -bottom-4 text-8xl opacity-10 rotate-12"></i>
            </div>

            <h3 class="font-bold text-lg">Quick Access</h3>
            <div class="grid grid-cols-2 gap-4">
                <div onclick="startQuiz('Biology')" class="glass p-6 rounded-3xl text-center shadow-sm cursor-pointer hover:scale-105 transition">
                    <i class="fas fa-dna text-3xl text-green-500 mb-2"></i>
                    <p class="font-bold">Biology</p>
                </div>
                <div onclick="startQuiz('Physics')" class="glass p-6 rounded-3xl text-center shadow-sm cursor-pointer hover:scale-105 transition">
                    <i class="fas fa-atom text-3xl text-blue-500 mb-2"></i>
                    <p class="font-bold">Physics</p>
                </div>
            </div>
        </section>

        <section id="categories" class="page space-y-4">
            <h2 class="text-xl font-bold mb-4">Select Subject</h2>
            <div class="space-y-3">
                <button onclick="startQuiz('Biology')" class="w-full glass p-5 rounded-2xl flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="bg-green-100 p-3 rounded-xl text-green-600"><i class="fas fa-leaf"></i></div>
                        <span class="font-bold">Biology Master</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="startQuiz('Physics')" class="w-full glass p-5 rounded-2xl flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="bg-blue-100 p-3 rounded-xl text-blue-600"><i class="fas fa-bolt"></i></div>
                        <span class="font-bold">Physics Core</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 group-hover:translate-x-1 transition"></i>
                </button>
                <button onclick="startQuiz('Chemistry')" class="w-full glass p-5 rounded-2xl flex items-center justify-between group">
                    <div class="flex items-center gap-4">
                        <div class="bg-orange-100 p-3 rounded-xl text-orange-600"><i class="fas fa-flask"></i></div>
                        <span class="font-bold">Chemistry Lab</span>
                    </div>
                    <i class="fas fa-chevron-right text-slate-300 group-hover:translate-x-1 transition"></i>
                </button>
            </div>
        </section>

        <section id="quiz" class="page">
            <div class="flex items-center justify-between mb-4">
                <button onclick="switchPage('home')" class="text-slate-400"><i class="fas fa-arrow-left"></i></button>
                <div class="h-1.5 flex-grow mx-4 bg-slate-200 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-600 w-0 transition-all"></div>
                </div>
                <span id="timer" class="text-xs font-mono font-bold text-red-500">10:00</span>
            </div>

            <div id="question-card" class="glass p-6 rounded-[2rem] shadow-xl">
                </div>
            
            <button id="next-btn" onclick="nextQuestion()" class="hidden w-full mt-6 bg-blue-600 text-white py-4 rounded-2xl font-bold shadow-lg">Next Question</button>
        </section>

        <section id="settings" class="page space-y-6">
            <h2 class="text-2xl font-bold">Settings</h2>
            <div class="glass p-6 rounded-3xl space-y-6">
                <div class="flex justify-between items-center">
                    <div><p class="font-bold">Dark Mode</p><p class="text-xs text-slate-400">Night study mode</p></div>
                    <button onclick="toggleTheme()" id="theme-btn" class="w-12 h-6 bg-slate-300 rounded-full relative p-1">
                        <div class="w-4 h-4 bg-white rounded-full transition-all" id="theme-dot"></div>
                    </button>
                </div>
                <hr class="opacity-10">
                <div class="flex justify-between items-center">
                    <div><p class="font-bold">Text Size</p><p class="text-xs text-slate-400">Adjust readability</p></div>
                    <select onchange="changeFontSize(this.value)" class="bg-slate-100 dark:bg-slate-700 p-2 rounded-lg text-sm outline-none">
                        <option value="16px">Normal</option>
                        <option value="20px">Large</option>
                        <option value="24px">Extra Large</option>
                    </select>
                </div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-0 w-full glass border-t p-3 flex justify-around">
        <button onclick="switchPage('home')" class="nav-btn flex flex-col items-center text-blue-600">
            <i class="fas fa-house-chimney text-lg"></i><span class="text-[10px] font-bold mt-1 uppercase">Home</span>
        </button>
        <button onclick="switchPage('categories')" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fas fa-grid-2 text-lg"></i><span class="text-[10px] font-bold mt-1 uppercase">Explore</span>
        </button>
        <button onclick="switchPage('settings')" class="nav-btn flex flex-col items-center text-slate-400">
            <i class="fas fa-sliders text-lg"></i><span class="text-[10px] font-bold mt-1 uppercase">Settings</span>
        </button>
    </nav>

    <script>
        // --- MASTER QUESTION BANK ---
        const masterDB = [
            { sub: "Biology", q: "Powerhouse of the cell is?", opts: ["Nucleus", "Ribosome", "Mitochondria", "Lysosome"], ans: "Mitochondria", img: "https://upload.wikimedia.org/wikipedia/commons/0/0c/Animal_mitochondrion_diagram_en.svg" },
            { sub: "Physics", q: "Unit of Force is?", opts: ["Watt", "Newton", "Pascal", "Joule"], ans: "Newton" },
            { sub: "Chemistry", q: "pH of pure water is?", opts: ["5", "6", "7", "8"], ans: "7" }
        ];

        // System State
        let currentSet = [];
        let curIdx = 0;
        let score = 0;

        // Navigation Logic
        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // Update Nav Icons
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.replace('text-blue-600', 'text-slate-400'));
            event?.currentTarget?.classList?.replace('text-slate-400', 'text-blue-600');
        }

        // Quiz Engine
        function startQuiz(subject) {
            currentSet = masterDB.filter(q => q.sub === subject || subject === 'All');
            curIdx = 0;
            score = 0;
            switchPage('quiz');
            renderQuestion();
        }

        function renderQuestion() {
            const q = currentSet[curIdx];
            const area = document.getElementById('question-card');
            document.getElementById('next-btn').classList.add('hidden');
            document.getElementById('progress-bar').style.width = `${(curIdx / currentSet.length) * 100}%`;

            area.innerHTML = `
                <div class="text-[10px] font-bold text-blue-500 uppercase tracking-widest mb-2">${q.sub}</div>
                <h2 class="text-xl font-bold mb-6">${q.q}</h2>
                ${q.img ? `<img src="${q.img}" class="w-full h-40 object-contain mb-6 rounded-2xl bg-slate-50 p-2">` : ''}
                <div class="space-y-3">
                    ${q.opts.map(o => `<button onclick="checkAns(this, '${o}')" class="option-card w-full p-4 rounded-xl text-left font-medium text-sm flex justify-between items-center">
                        ${o} <i class="fas fa-circle-check opacity-0"></i>
                    </button>`).join('')}
                </div>
            `;
        }

        function checkAns(btn, choice) {
            const correct = currentSet[curIdx].ans;
            if(document.querySelector('.correct')) return;

            if(choice === correct) {
                btn.classList.add('correct');
                score += 4;
            } else {
                btn.classList.add('wrong');
                score -= 1;
                document.querySelectorAll('.option-card').forEach(b => {
                    if(b.innerText.trim() === correct) b.classList.add('correct');
                });
            }
            document.getElementById('global-score').innerText = `Score: ${score}`;
            document.getElementById('next-btn').classList.remove('hidden');
        }

        function nextQuestion() {
            curIdx++;
            if(curIdx < currentSet.length) renderQuestion();
            else finishQuiz();
        }

        function finishQuiz() {
            document.getElementById('question-card').innerHTML = `
                <div class="text-center py-6">
                    <i class="fas fa-medal text-6xl text-yellow-400 mb-4"></i>
                    <h2 class="text-2xl font-bold">Quiz Done!</h2>
                    <p class="text-slate-400 mt-2">Final Score: ${score}</p>
                    <button onclick="switchPage('home')" class="mt-8 bg-blue-600 text-white px-10 py-3 rounded-full font-bold">Go Home</button>
                </div>
            `;
            document.getElementById('next-btn').classList.add('hidden');
        }

        // Settings Logic
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const dot = document.getElementById('theme-dot');
            const btn = document.getElementById('theme-btn');
            if(document.documentElement.classList.contains('dark')) {
                dot.style.transform = 'translateX(24px)';
                btn.classList.replace('bg-slate-300', 'bg-blue-600');
            } else {
                dot.style.transform = 'translateX(0px)';
                btn.classList.replace('bg-blue-600', 'bg-slate-300');
            }
        }

        function changeFontSize(size) {
            document.getElementById('question-card').style.fontSize = size;
        }
    </script>
</body>
                </html>
